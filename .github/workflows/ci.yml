name: CI

on:
  push:
    branches:
      - main
    paths:
      - "**/*.rs"
      - "**/*.vif"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - ".cargo/**"
      - ".config/nextest.toml"
      - ".github/**"
  pull_request:
    paths:
      - "**/*.rs"
      - "**/*.vif"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - ".cargo/**"
      - ".config/nextest.toml"
      - ".github/**"
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC daily
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  CLICOLOR: 1
  CLICOLOR_FORCE: 1
  FORCE_COLOR: 1
  LLVM_VERSION: "21.1.1"
  LLVM_APT_VERSION: "21"

jobs:
  ci:
    name: CI / ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-14
          - name: Linux
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - shell: bash
        run: |
          echo "::add-matcher::.github/rust-code-quality.json"
          echo "::add-matcher::.github/rust-nextest.json"

      - uses: ./.github/actions/install-dependencies
        with:
          install-nextest: "true"

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - name: Format
        run: cargo fmt --all -- --check

      # - name: Clippy
      #   run: cargo clippy --workspace --all-targets --all-features --locked -- -Dwarnings

      - name: Test
        run: cargo nextest run --workspace --all-features --locked --profile ci

      - name: Upload nextest report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nextest-${{ matrix.name }}
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  nightly-build:
    name: Nightly / ${{ matrix.name }}
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs:
      - ci
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-14
          - name: Linux
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install-dependencies

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - name: Build release
        run: cargo build --release --config .cargo/release.toml

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact\package | Out-Null
          Copy-Item target\release\vifc.exe artifact\package\vifc-windows-x86_64.exe
          if (Test-Path target\release\vifc.pdb) {
            Copy-Item target\release\vifc.pdb artifact\package\vifc-windows-x86_64.pdb
          }
          Copy-Item -Recurse std artifact\package\std
          Compress-Archive -Path artifact\package\* -DestinationPath vifc-windows-x86_64.zip -Force

      - name: Package Linux release
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p artifact/vifc-linux-x86_64
          cp target/release/vifc artifact/vifc-linux-x86_64/vifc-linux-x86_64
          cp -R std artifact/vifc-linux-x86_64/std
          tar --zstd -cf vifc-linux-x86_64.tar.zst -C artifact vifc-linux-x86_64

      - name: Package macOS release
        if: runner.os == 'macOS'
        shell: bash
        run: |
          arch="$(uname -m)"
          case "${arch}" in
            arm64) platform="macos-aarch64" ;;
            x86_64) platform="macos-x86_64" ;;
            *) platform="macos-${arch}" ;;
          esac
          mkdir -p "artifact/vifc-${platform}"
          cp target/release/vifc "artifact/vifc-${platform}/vifc-${platform}"
          cp -R std "artifact/vifc-${platform}/std"
          tar --zstd -cf "vifc-${platform}.tar.zst" -C artifact "vifc-${platform}"

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: nightly-archive-${{ matrix.name }}
          path: |
            vifc-windows-x86_64.zip
            vifc-linux-x86_64.tar.zst
            vifc-macos-*.tar.zst
          if-no-files-found: error
          retention-days: 7

  nightly-publish:
    name: Publish Nightly Release
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs:
      - nightly-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download release archives
        uses: actions/download-artifact@v8
        with:
          pattern: nightly-archive-*
          path: dist
          merge-multiple: true

      - name: Prepare nightly release metadata
        id: release-meta
        run: |
          release_date="$(date -u +'%d-%m-%Y')"
          echo "date=${release_date}" >> "${GITHUB_OUTPUT}"
          echo "tag=nightly-${release_date}" >> "${GITHUB_OUTPUT}"

      - name: Check nightly release does not exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.release-meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.release-meta.outputs.tag }} already exists; refusing to overwrite an immutable dated release."
            exit 1
          fi

      - name: Publish nightly release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release-meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Nightly ${{ steps.release-meta.outputs.date }}
          body: |
            Automated nightly build from `${{ github.sha }}`.

            Archives include the compiler binary and `std/` sources for each supported platform.
          draft: true
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: dist/*

      - name: Publish nightly draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ steps.release-meta.outputs.tag }}" --draft=false --prerelease
